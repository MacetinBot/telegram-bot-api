name: Build Telegram Bot API

on:
  workflow_dispatch:

jobs:

  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make git zlib1g-dev libssl-dev \
            gperf cmake clang libc++-dev libc++abi-dev

      - name: Compilar
        run: |
          mkdir build
          cd build

          cmake -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CXX_COMPILER=clang++ \
                -DCMAKE_C_COMPILER=clang \
                -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
                -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++" \
                ..

          cmake --build . -j$(nproc)

      - name: Subir binario
        uses: actions/upload-artifact@v4
        with:
          name: telegram-bot-api-linux
          path: build/telegram-bot-api

  build-windows:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Instalar gperf
        run: choco install gperf -y

      - name: Instalar dependencias
        run: |
          vcpkg install zlib:x64-windows openssl:x64-windows
        env:
          VCPKG_DEFAULT_TRIPLET: x64-windows

      - name: Configurar CMake
        run: |
          mkdir build
          cd build

          cmake -A x64 `
                -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
                -DCMAKE_BUILD_TYPE=Release `
                ..

      - name: Compilar
        run: |
          cd build
          cmake --build . --config Release

      - name: Subir binario
        uses: actions/upload-artifact@v4
        with:
          name: telegram-bot-api-windows
          path: build/Release/telegram-bot-api.exe
